<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>number-go-up</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        color: #fff;
      }
      #count {
        font-size: 10rem;
        font-weight: 800;
        margin: 0 0 2rem 0;
        line-height: 1;
        transition: color 0.3s ease-out;
      }
      @keyframes pulse {
        0%   { transform: scale(1);    color: #ffffff; }
        40%  { transform: scale(1.18); color: #ffd166; }
        100% { transform: scale(1);    color: #ffffff; }
      }
      #count.pulse {
        animation: pulse 0.35s ease-out;
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20%      { transform: translateX(-10px); }
        40%      { transform: translateX(10px); }
        60%      { transform: translateX(-6px); }
        80%      { transform: translateX(6px); }
      }
      #count.shake {
        animation: shake 0.4s ease-in-out;
      }
      #click {
        font-size: 1.5rem;
        font-weight: 700;
        padding: 1rem 2.5rem;
        border: none;
        border-radius: 999px;
        background: #e94560;
        color: #fff;
        cursor: pointer;
      }
      #reset {
        margin-top: 1.25rem;
        font-size: 0.9rem;
        padding: 0.5rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 999px;
        background: transparent;
        color: rgba(255, 255, 255, 0.7);
        cursor: pointer;
      }
      #click {
        transition: transform 0.08s ease-out, background-color 0.15s ease-out, box-shadow 0.15s ease-out;
        box-shadow: 0 6px 20px rgba(233, 69, 96, 0.35);
      }
      #click:hover {
        background: #ff5c77;
        box-shadow: 0 8px 26px rgba(233, 69, 96, 0.5);
      }
      #click:active {
        transform: translateY(2px) scale(0.98);
        box-shadow: 0 3px 12px rgba(233, 69, 96, 0.35);
      }
      #reset:hover {
        color: #fff;
        border-color: rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="count">0</div>
    <button id="click">Click me</button>
    <button id="reset">Reset</button>
    <script>
      const countEl = document.getElementById("count");
      const clickBtn = document.getElementById("click");
      const resetBtn = document.getElementById("reset");

      const STORAGE_KEY = "numberGoUp.count";

      function loadCount() {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = Number.parseInt(raw, 10);
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function saveCount() {
        localStorage.setItem(STORAGE_KEY, String(count));
      }

      let count = loadCount();

      function render() {
        countEl.textContent = String(count);
      }

      function playAnimation(name) {
        countEl.classList.remove(name);
        void countEl.offsetWidth;
        countEl.classList.add(name);
      }

      clickBtn.addEventListener("click", () => {
        count += 1;
        saveCount();
        render();
        playAnimation("pulse");
      });

      resetBtn.addEventListener("click", () => {
        count = 0;
        saveCount();
        render();
        playAnimation("shake");
      });

      render();
    </script>
  </body>
</html>
